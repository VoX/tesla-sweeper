<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Sweeper — Somerville Street Sweeping Check</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
h1{font-size:1.5rem;margin-bottom:4px;color:#58a6ff}
.subtitle{color:#8b949e;font-size:0.85rem;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:10px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:0.85rem;cursor:pointer;text-align:center}
.tab.active{background:#1f2937;border-color:#58a6ff;color:#58a6ff}
.tab-content{display:none}
.tab-content.active{display:block}
label{display:block;font-size:0.85rem;color:#8b949e;margin-bottom:6px}
input{width:100%;padding:10px 12px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.9rem;margin-bottom:16px}
input:focus{outline:none;border-color:#58a6ff}
button{width:100%;padding:12px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:16px}
button:hover{background:#2ea043}
button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
#status{padding:16px;border-radius:8px;margin-bottom:16px;display:none}
.safe{background:#0d1f0d;border:1px solid #238636;color:#3fb950}
.warning{background:#2a1f00;border:1px solid #d29922;color:#e3b341}
.danger{background:#2d0a0a;border:1px solid #f85149;color:#f85149}
.info{background:#0d1f2d;border:1px solid #58a6ff;color:#58a6ff}
#status h2{font-size:1.1rem;margin-bottom:8px}
#status p{font-size:0.9rem;line-height:1.5}
#map{height:250px;border-radius:8px;margin-bottom:16px;display:none;border:1px solid #30363d}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;display:none;margin-bottom:16px}
.card h3{font-size:0.9rem;color:#58a6ff;margin-bottom:8px}
.card .row{display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;border-bottom:1px solid #21262d}
.card .row:last-child{border:none}
.card .label{color:#8b949e}
.event{padding:6px 0;font-size:0.85rem;border-bottom:1px solid #21262d;display:flex;justify-content:space-between}
.event:last-child{border:none}
.event-date{color:#c9d1d9}
.event-side{color:#8b949e}
.error{color:#f85149;font-size:0.85rem;margin-bottom:12px;display:none}
#oauth-status{display:none;font-size:0.85rem;color:#8b949e;margin-bottom:12px}
footer{text-align:center;color:#484f58;font-size:0.75rem;margin-top:24px;padding-bottom:20px}
footer a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <h1>🚗 Tesla Sweeper</h1>
  <p class="subtitle">Check if your car needs to move for Somerville street sweeping</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('address')">📍 Address</div>
    <div class="tab" onclick="switchTab('oauth')">🔐 Tesla OAuth</div>
    <div class="tab" onclick="switchTab('tesla')">🔑 Bearer Token</div>
  </div>

  <div id="tab-address" class="tab-content active">
    <label for="address">Street Address in Somerville</label>
    <input type="text" id="address" placeholder="e.g. 11 Harvard St">
    <button onclick="checkAddress(this)">Check Sweeping Schedule</button>
  </div>

  <div id="tab-oauth" class="tab-content">
    <label for="oauth-client-id">Tesla App Client ID</label>
    <input type="text" id="oauth-client-id" placeholder="From developer.tesla.com">
    <label for="oauth-client-secret">Client Secret</label>
    <input type="password" id="oauth-client-secret" placeholder="Your app's client secret">
    <label for="oauth-redirect">Redirect URI</label>
    <input type="text" id="oauth-redirect" placeholder="e.g. https://claw.bitvox.me/sweeper/">
    <button id="oauth-btn" onclick="startOAuth()">Connect Tesla Account</button>
    <div id="oauth-status"></div>
  </div>

  <div id="tab-tesla" class="tab-content">
    <label for="token">Tesla API Bearer Token</label>
    <input type="password" id="token" placeholder="Paste your Tesla bearer token...">
    <button onclick="checkTesla(this)">Check My Car</button>
  </div>

  <p class="error" id="error"></p>
  <div id="status"></div>
  <div id="map"></div>
  <div class="card" id="upcoming"></div>
  <div class="card" id="details"></div>
</div>

<footer>
  Somerville sweeping: Apr 1 – Dec 31 · Data from Recollect/City of Somerville · Always check street signs
  <br><a href="https://github.com/VoX/tesla-sweeper">GitHub</a>
</footer>

<script>
let map = null, marker = null;

async function post(url, body) {
  const res = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
  if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
  return res.json();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`#tab-${tab}`).classList.add('active');
  document.querySelectorAll('.tab')[{address:0, oauth:1, tesla:2}[tab] || 0].classList.add('active');
  document.getElementById('error').style.display = 'none';
}

async function startOAuth() {
  const clientId = document.getElementById('oauth-client-id').value.trim();
  const clientSecret = document.getElementById('oauth-client-secret').value.trim();
  const redirectUri = document.getElementById('oauth-redirect').value.trim() || window.location.href.split('?')[0];
  if (!clientId || !clientSecret) { showError('Client ID and Secret are required'); return; }

  sessionStorage.setItem('tesla_client_id', clientId);
  sessionStorage.setItem('tesla_client_secret', clientSecret);
  sessionStorage.setItem('tesla_redirect_uri', redirectUri);

  try {
    const data = await post('api/oauth/start', {client_id: clientId, redirect_uri: redirectUri});
    sessionStorage.setItem('tesla_oauth_state', data.state);
    window.location.href = data.url;
  } catch (e) { showError('Failed to start OAuth: ' + e.message); }
}

async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code) return;

  const savedState = sessionStorage.getItem('tesla_oauth_state');
  if (!state || !savedState) { showError('OAuth state missing — possible CSRF. Try again.'); return; }
  if (state !== savedState) { showError('OAuth state mismatch — possible CSRF. Try again.'); return; }

  const clientId = sessionStorage.getItem('tesla_client_id');
  const clientSecret = sessionStorage.getItem('tesla_client_secret');
  const redirectUri = sessionStorage.getItem('tesla_redirect_uri');
  if (!clientId || !clientSecret) { showError('Missing OAuth credentials. Please start the flow again.'); return; }

  window.history.replaceState({}, '', window.location.pathname);
  const statusEl = document.getElementById('oauth-status');
  statusEl.style.display = 'block';
  statusEl.textContent = 'Exchanging code for token...';
  switchTab('oauth');

  try {
    const data = await post('api/oauth/callback', {client_id: clientId, client_secret: clientSecret, redirect_uri: redirectUri, code});
    statusEl.textContent = '\u2705 Connected! Checking your car...';
    document.getElementById('token').value = data.access_token;
    await checkVehicleWithToken(data.access_token);
    sessionStorage.removeItem('tesla_client_id');
    sessionStorage.removeItem('tesla_client_secret');
    sessionStorage.removeItem('tesla_redirect_uri');
    sessionStorage.removeItem('tesla_oauth_state');
  } catch (e) { statusEl.textContent = '\u274C ' + e.message; }
}

async function checkVehicleWithToken(token) {
  const vehicle = await post('api/check', {token});
  const geo = await post('api/reverse-geocode', {lat: vehicle.latitude, lng: vehicle.longitude});
  showMap(vehicle.latitude, vehicle.longitude, geo.street || 'Unknown');

  const addr = [geo.house_number, geo.street].filter(Boolean).join(' ');
  if (!addr) {
    showStatus('info', 'Location Found', `Car at ${vehicle.latitude.toFixed(5)}, ${vehicle.longitude.toFixed(5)} but couldn't determine street.`);
    return null;
  }

  const data = await post('api/sweep-check', {address: addr, tz_offset: new Date().getTimezoneOffset()});
  if (data.found) {
    showSweepResults(data, vehicle.vehicle_name, geo.display_name, vehicle.latitude, vehicle.longitude);
  } else {
    showStatus('info', 'Street Not Found', `"${addr}" not in Somerville sweeping database.`);
  }
  return data;
}

async function checkAddress(btn) {
  const address = document.getElementById('address').value.trim();
  if (!address) { showError('Please enter an address'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking...';
  hideResults();

  try {
    const data = await post('api/sweep-check', {address, tz_offset: new Date().getTimezoneOffset()});
    if (!data.found) { showError(data.message); return; }
    showSweepResults(data);
  } catch (e) { showError(e.message); }
  finally { btn.disabled = false; btn.textContent = 'Check Sweeping Schedule'; }
}

async function checkTesla(btn) {
  const token = document.getElementById('token').value.trim();
  if (!token) { showError('Please enter your Tesla bearer token'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking...';
  hideResults();

  try { await checkVehicleWithToken(token); }
  catch (e) { showError(e.message); }
  finally { btn.disabled = false; btn.textContent = 'Check My Car'; }
}

function showMap(lat, lng, street) {
  document.getElementById('map').style.display = 'block';
  if (!map) {
    map = L.map('map').setView([lat, lng], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OpenStreetMap'}).addTo(map);
    marker = L.marker([lat, lng]).addTo(map);
  } else {
    map.setView([lat, lng], 17);
    marker.setLatLng([lat, lng]);
  }
  const popup = document.createElement('div');
  const b = document.createElement('b');
  b.textContent = 'Your Car';
  popup.appendChild(b);
  popup.appendChild(document.createElement('br'));
  popup.appendChild(document.createTextNode(street));
  marker.bindPopup(popup).openPopup();
}

function row(label, value) {
  const r = document.createElement('div');
  r.className = 'row';
  const l = document.createElement('span');
  l.className = 'label';
  l.textContent = label;
  const v = document.createElement('span');
  v.textContent = value;
  r.appendChild(l);
  r.appendChild(v);
  return r;
}

function showSweepResults(data, vehicleName, fullAddr, lat, lng) {
  showStatus(data.status, data.title, data.message);

  if (data.sweep_events && data.sweep_events.length > 0) {
    const el = document.getElementById('upcoming');
    el.style.display = 'block';
    el.textContent = '';
    const h3 = document.createElement('h3');
    h3.textContent = 'Upcoming Sweeping Events';
    el.appendChild(h3);
    for (const evt of data.sweep_events.slice(0, 8)) {
      const d = new Date(evt.date + 'T12:00:00');
      const evDiv = document.createElement('div');
      evDiv.className = 'event';
      const dateSpan = document.createElement('span');
      dateSpan.className = 'event-date';
      dateSpan.textContent = d.toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'});
      const sideSpan = document.createElement('span');
      sideSpan.className = 'event-side';
      sideSpan.textContent = evt.side + ' side \u00B7 ' + evt.time;
      evDiv.appendChild(dateSpan);
      evDiv.appendChild(sideSpan);
      el.appendChild(evDiv);
    }
  }

  const details = document.getElementById('details');
  details.style.display = 'block';
  details.textContent = '';
  const dh3 = document.createElement('h3');
  dh3.textContent = 'Details';
  details.appendChild(dh3);
  details.appendChild(row('Address', data.place_name || fullAddr || ''));
  if (data.car_side) details.appendChild(row('Your Side', data.car_side + ' (#' + data.house_num + ')'));
  if (vehicleName) details.appendChild(row('Vehicle', vehicleName));
  if (lat) details.appendChild(row('Coordinates', lat.toFixed(5) + ', ' + lng.toFixed(5)));

  // Sweeping rules summary
  if (data.sweep_events && data.sweep_events.length > 0) {
    const sides = [...new Set(data.sweep_events.map(e => e.side))];
    const times = [...new Set(data.sweep_events.map(e => e.time))];
    const ruleText = sides.map(s => s + ' side').join(' & ') + ' · ' + times[0];
    details.appendChild(row('Sweeping Rules', ruleText));
  }

  details.appendChild(row('Data Source', 'City of Somerville / Recollect'));
}

function showStatus(level, title, msg) {
  const el = document.getElementById('status');
  el.className = level;
  el.textContent = '';
  const icon = {danger: '\u{1F6A8}', warning: '\u26A0\uFE0F', safe: '\u2705', info: '\u2139\uFE0F'}[level] || '';
  const h2 = document.createElement('h2');
  h2.textContent = icon + ' ' + title;
  const p = document.createElement('p');
  p.textContent = msg;
  el.appendChild(h2);
  el.appendChild(p);
  el.style.display = 'block';
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideResults() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('upcoming').style.display = 'none';
  document.getElementById('details').style.display = 'none';
}

document.getElementById('address').addEventListener('keydown', e => { if (e.key === 'Enter') checkAddress(e.target.closest('.tab-content').querySelector('button')); });
document.getElementById('token').addEventListener('keydown', e => { if (e.key === 'Enter') checkTesla(e.target.closest('.tab-content').querySelector('button')); });
document.getElementById('oauth-redirect').value = window.location.href.split('?')[0].split('#')[0];
handleOAuthCallback();
</script>
</body>
</html>
